llm:
  base_url: "http://192.168.45.124:1234/v1"
  api_key: "lm-studio"
  model: "openai/gpt-oss-20b"
  timeout_sec: 600
  max_tokens: 2048

run:
  max_role_retries: 3
  max_fix_loops: 6
  verbose: true

profiles:
  enterprise:
    repo_template: "python_fastapi"
    validators:
      - ruff
      - mypy
      - pytest
      - pip_audit
      - bandit
      - docker_build
