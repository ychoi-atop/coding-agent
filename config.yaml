llm:
  base_url: "http://127.0.0.1:11434/v1"
  api_key: ${AUTODEV_LLM_API_KEY}  # 우선순위 1 (하위호환)
  oauth_token: ${AUTODEV_CLAUDE_CODE_OAUTH_TOKEN}  # api_key 비어있을 때 사용
  model: "anthropic/claude-sonnet-4-6"
  timeout_sec: 600
  role_temperatures:
    prd_normalizer: 0.2
    planner: 0.4
    implementer: 0.1
    fixer: 0.15
    architect: 0.3
    reviewer: 0.15

  # -- Multi-model routing (optional) --
  # Uncomment to route roles to different model endpoints.
  # Fallback: if a primary endpoint fails, the next endpoint in the list is tried.
  #
  # models:
  #   - base_url: "http://127.0.0.1:11434/v1"
  #     model: "anthropic/claude-opus-4-6"
  #     api_key: ${AUTODEV_LLM_API_KEY}
  #   - base_url: "http://127.0.0.1:11434/v1"
  #     model: "anthropic/claude-sonnet-4-6"
  #     api_key: ${AUTODEV_LLM_API_KEY}
  # role_mapping:
  #   planner: 0        # Use Opus for planning (stronger reasoning)
  #   architect: 0      # Use Opus for architecture design
  #   prd_normalizer: 1 # Use Sonnet for PRD normalization (fast)
  #   implementer: 1    # Use Sonnet for implementation (fast, cheap)
  #   fixer: 1          # Use Sonnet for fixes
  #   reviewer: 1       # Use Sonnet for code review

run:
  max_json_repair: 2
  max_fix_loops_total: 10
  max_fix_loops_per_task: 4
  verbose: true
  budget:
    max_tokens: 500000

profiles:
  enterprise:
    template_candidates:
      - "python_fastapi"
      - "python_cli"
      - "python_library"
    validators:
      - ruff
      - mypy
      - pytest
      - pip_audit
      - bandit
      - semgrep
      - sbom
      - docker_build
    security:
      audit_required: false
    validator_policy:
      per_task:
        soft_fail:
          - docker_build
          - pip_audit
          - semgrep
          - sbom
      final:
        soft_fail:
          - pip_audit
          - sbom
          - semgrep
          - docker_build
    quality_profile:
      name: balanced
      per_task_soft: ["docker_build", "pip_audit", "sbom"]
      final_soft: ["pip_audit", "sbom", "semgrep"]
      by_level:
        minimal:
          per_task_soft: ["docker_build", "pip_audit", "sbom", "semgrep"]
          final_soft: ["pip_audit", "sbom", "semgrep"]
        balanced:
          per_task_soft: ["docker_build", "pip_audit", "sbom"]
          final_soft: ["pip_audit", "sbom", "semgrep"]
        strict:
          per_task_soft: ["docker_build"]
          final_soft: []
      escalation:
        repeat_failure_guard:
          enabled: true
          max_retries_before_targeted_fix: 1

  enterprise_smoke:
    template_candidates:
      - "python_cli"
    validators:
      - ruff
      - pytest
    security:
      audit_required: false
    quality_profile:
      name: minimal
      per_task_soft: []
      final_soft: []
