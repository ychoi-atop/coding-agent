llm:
  # OpenClaw OAuth bridge (OpenAI-compatible chat/completions endpoint)
  # Bridge path (confirmed): http://127.0.0.1:18789/v1
  # NOTE: AutoDev always sends Authorization: Bearer <token>.
  #       Use a non-empty dummy API key placeholder when bridge auth is handled upstream.
  base_url: "http://127.0.0.1:18789/v1"
  api_key: ${AUTODEV_LLM_API_KEY}
  oauth_token: ""
  model: "anthropic/claude-opus-4-6"
  timeout_sec: 600
  role_temperatures:
    prd_analyst: 0.2
    prd_normalizer: 0.2
    planner: 0.4
    acceptance_test_generator: 0.15
    implementer: 0.1
    fixer: 0.15
    architect: 0.3
    api_spec_generator: 0.15
    db_schema_generator: 0.1
    reviewer: 0.15

  # -- Multi-model routing + fallback (optional) --
  # Default endpoint = index 0. On retryable transport failures, AutoDev tries the next endpoint.
  models:
    - base_url: "http://127.0.0.1:18789/v1"
      model: "anthropic/claude-opus-4-6"
      api_key: ${AUTODEV_LLM_API_KEY}
      oauth_token: ""

  # OAuth profile example (only for gateways that explicitly support OAuth Bearer on chat/completions):
  # base_url: "https://<oauth-compatible-gateway>/v1"
  # api_key: ""
  # oauth_token: ${AUTODEV_CLAUDE_CODE_OAUTH_TOKEN}
  # model: "<provider-model-id>"
  # role_mapping:
  #   planner: 0
  #   architect: 0
  #   implementer: 1
  #   fixer: 1
  #   reviewer: 1

run:
  max_json_repair: 2
  max_fix_loops_total: 10
  max_fix_loops_per_task: 4
  verbose: true
  budget:
    max_tokens: 500000

profiles:
  local_simple:
    # Single-user local laptop defaults: fast feedback, low setup friction.
    template_candidates:
      - "python_cli"
      - "python_fastapi"
    validators:
      - ruff
      - pytest
    security:
      audit_required: false
    quality_profile:
      name: minimal
      per_task_soft: []
      final_soft: []

  enterprise:
    template_candidates:
      - "python_fastapi"
      - "python_cli"
      - "python_library"
    validators:
      - ruff
      - mypy
      - pytest
      - pip_audit
      - bandit
      - semgrep
      - sbom
      - docker_build
    security:
      audit_required: false
    validator_policy:
      per_task:
        soft_fail:
          - docker_build
          - pip_audit
          - semgrep
          - sbom
      final:
        soft_fail:
          - pip_audit
          - sbom
          - semgrep
          - docker_build
    quality_profile:
      name: balanced
      per_task_soft: ["docker_build", "pip_audit", "sbom"]
      final_soft: ["pip_audit", "sbom", "semgrep"]
      by_level:
        minimal:
          per_task_soft: ["docker_build", "pip_audit", "sbom", "semgrep"]
          final_soft: ["pip_audit", "sbom", "semgrep"]
        balanced:
          per_task_soft: ["docker_build", "pip_audit", "sbom"]
          final_soft: ["pip_audit", "sbom", "semgrep"]
        strict:
          per_task_soft: ["docker_build"]
          final_soft: []
      escalation:
        repeat_failure_guard:
          enabled: true
          max_retries_before_targeted_fix: 1

  enterprise_smoke:
    template_candidates:
      - "python_cli"
    validators:
      - ruff
      - pytest
    security:
      audit_required: false
    quality_profile:
      name: minimal
      per_task_soft: []
      final_soft: []

  openclaw-oauth-bridge:
    # Convenience profile for bridge connectivity smoke/dev runs.
    # Keep only pytest to make bridge smoke checks deterministic/minimal.
    template_candidates:
      - "python_cli"
    validators:
      - pytest
    security:
      audit_required: false
    quality_profile:
      name: minimal
      per_task_soft: []
      final_soft: []
